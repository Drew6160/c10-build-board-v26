<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>C10 Build Board 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="card">
  <h2>1967 C10 — Electrical Build Board</h2>
</header>

<!-- TAB 1: DIAGRAM -->
<div id="tab-diagram" class="tab-content">
  <div class="diagram-shell" id="diagramShell">

    <!-- MAIN: loom strip + diagram canvas -->
    <div class="diagram-main">
      <div class="card" id="loomPanel"></div>
      <div class="card" id="layoutPanel">
        <svg id="layoutSVG" viewBox="0 0 1000 680"></svg>
      </div>
    </div>

    <!-- RAIL: controls / playback / status / analysis — collapsible -->
    <div class="diagram-rail">
      <div class="card" id="controlsPanel"></div>
      <div class="card" id="playbackPanel"></div>
      <div class="card" id="graphPanel"></div>
      <div class="card" id="analysisPanel"></div>
    </div>

  </div>
</div>

<!-- TAB 2: BUILD MANAGEMENT -->
<div id="tab-manage" class="tab-content" style="display:none">
  <div class="manage-grid">
    <div class="stack">
      <div class="card" id="componentEditorPanel"></div>
      <div class="card" id="edgeEditorPanel"></div>
    </div>
    <div class="stack">
      <div class="card" id="statusEditorPanel"></div>
      <div class="card" id="bomPanel"></div>
      <div class="card" id="wiringSpecPanel"></div>
      <div class="card" id="drcPanel"></div>
      <div class="card" id="exportPanel"></div>
    </div>
  </div>
</div>

<!-- TAB 3: WIREVIZ HARNESS VIEWER -->
<div id="tab-wireviz" class="tab-content" style="display:none">

  <div class="card">

    <h3>WireViz Harness Schematics</h3>

    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">

      <select id="wirevizSelect">
        <option value="">Select Harness</option>
      </select>

      <input
        type="file"
        id="wirevizUpload"
        accept=".html"
        multiple
      >

    </div>

    <iframe
      id="wirevizFrame"
      style="
        width:100%;
        height:900px;
        border:1px solid #444;
        border-radius:6px;
        background:white;
      ">
    </iframe>

  </div>

</div>

<!-- BOTTOM NAV: primary tab switcher -->
<nav class="bottom-nav">
  <button class="tab-btn active" onclick="switchTab('diagram',this)">
    <span class="tab-icon">⚡</span>Diagram
  </button>
  <button class="tab-btn" onclick="switchTab('manage',this)">
    <span class="tab-icon">🔧</span>Build Mgmt
  </button>
  <button class="tab-btn" onclick="switchTab('wireviz',this)">
    <span class="tab-icon">📐</span>Harness Viewer
  </button>
</nav>

<script src="js/data.js"></script>
<script src="js/core.js"></script>
<script src="js/simulation.js"></script>
<script src="js/failure.js"></script>
<script src="js/optimize.js"></script>
<script src="js/wiring.js"></script>
<script src="js/bom.js"></script>
<script src="js/drc.js"></script>
<script src="js/report.js"></script>
<script src="js/layout.js"></script>
<script src="js/ui.js"></script>
<script src="js/wireviz-viewer.js"></script>
</body>
</html>
